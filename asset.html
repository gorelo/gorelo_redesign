<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <title>Gorelo</title>
      <script src="https://kit.fontawesome.com/1ae5e758b8.js" crossorigin="anonymous"></script>
      <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
      <link href="assets/css/quasar.prod.css" rel="stylesheet" />
      <link href="assets/css/style.css" rel="stylesheet" />
   </head>
   <body>
      <div id="q-app">
         <q-layout view="lhh lpR fFf">
            <q-drawer class="leftmenu d-flex column no-wrap justify-space-between" :width="64"
               show-if-above v-model="leftDrawerOpen" side="left" behavior="desktop">
               <div class="row">
                  <div class="col text-center logodiv q-pt-sm"><img src="assets/images/logo.svg" /></div>
               </div>
               <div class="row full-height">
                  <div class="col">
                     <q-list dense class="navigationmenu q-mt-sm ">
                        <q-item href="ticket.html"><i
                           class="hgi hgi-stroke hgi-ticket-01"></i></q-item>
                        <q-item><i
                           class="hgi hgi-stroke hgi-alert-02"></i></q-item>
                        <q-item
                           class="active"><i class="hgi hgi-stroke hgi-laptop"></i></q-item>
                        <q-item  href="document.html"><i
                           class="hgi hgi-stroke hgi-note-edit"></i></q-item>
                        <q-item ><i
                           class="hgi hgi-stroke hgi-folder-library"></i></q-item>
                        <q-item><i
                           class="hgi hgi-stroke hgi-delivery-box-01"></i></q-item>
                        <q-item><i
                           class="hgi hgi-stroke hgi-invoice"></i></q-item>
                     </q-list>
                  </div>
               </div>
               <div class="row">
                  <div class="col">
                     <q-list dense class="navigationmenu q-mb-lg ">
                        <q-item clickable @click="toggleDark"><i v-if ="isDark" class="hgi hgi-stroke hgi-sun-01"></i>
                           <i v-else class="hgi hgi-stroke hgi-moon-02"></i></q-item>
                        <q-item><i class="hgi hgi-stroke hgi-delete-03"></i></q-item>
                        <q-item><i class="hgi hgi-stroke hgi-help-circle"></i></q-item>
                        <q-item><i class="hgi hgi-stroke hgi-arrow-left-double"></i></q-item>
                     </q-list>
                  </div>
               </div>
               <!-- <div class="row">
                  <div class="col">
                     <div class="version">v0.94.00</div>
                  </div>
               </div> -->
            </q-drawer>
            <q-page-container class="d-flex column no-wrap">
                <div class="row d-flex column no-wrap q-my-sm q-mr-sm pagearea"> 
                    <div class="col">

                    
               <div class="row">
                  <div class="col taskbardiv q-pr-md">
                     <div class="row">
                        <div class="col-auto addtabbtn notab" ><span><i class="hgi hgi-stroke hgi-plus-sign"></i></span></div>
                        <div class="col"></div>
                        <div class="col-auto topmenu">
                           <span><i class="hgi hgi-stroke hgi-search-01"></i></span>
                        </div>
                        <div class="col-auto topmenu">
                           <span>
                              <i class="hgi hgi-stroke hgi-notification-01"></i>
                           </span>
                        </div>
                        <div class="col-auto topmenu">
                           <span>
                              <i class="hgi hgi-stroke hgi-calendar-04"></i>
                           </span>
                        </div>
                     
                        <div class="col-auto topmenu">
                           <q-separator class="" vertical />
                        </div>
                        <div class="col-auto topmenu">
                           <div class="userinitials">MW</div>
                        </div>
                        <div class="col-auto topmenu">
                           <span>
                              <i class="hgi hgi-stroke hgi-laptop bg-active"></i>
                           </span>
                        </div>
                     </div>
                  </div>
               </div>
               <div class="row contentarea">
                  <div class="col leftviewsside">
                     <h3 class="q-px-md q-py-md">Views</h3>
                     <div class="q-px-md clientselect">
                        <q-select :class="{ 'has-value': !!SelectClientValue }" ref="clientSelectRef" outline dense
                           v-model="SelectClientValue" :options="filteredSelectClient"
                           clearable :menu-offset="[0,10]"
                           :hide-dropdown-icon="true" @clear="clearClientSelect" clear-icon="fal fa-xmark " 
                           hide-details
                           popup-content-class="menuWithSearch q-pa-sm" class="DropdownStyleClass"
                           standout>
                           <template v-slot:prepend>
                              <div class="dropdownicon">
                                 <i class="hgi hgi-stroke hgi-building-06"></i>
                              </div>
                           </template>
                             <!-- Dropdown Arrow -->
  <template #append>
   <i
     v-if="!shouldHideIcon"
     class="hgi hgi-stroke hgi-arrow-down-01 selectArrowIcon md--text"
   ></i>
 </template>


                           <template v-slot:selected>
                              <div style="font-size: 13px"
                                 :style="{ color: !SelectClientValue ? '' : '' }">
                                 {{ SelectClientValue ? SelectClientValue.label : 'All clients' }}
                              </div>
                           </template>
                           <template v-slot:before-options>
                              <div class="row">
                                 <div class="col-12">
                                    <q-input v-model="searchTerm" placeholder="Search..." dense borderless
                                    @update:model-value="ClientfilterOptions" @click.stop @keydown.stop
                                    @mousedown.stop>
                                    <template v-slot:prepend>
                                       <svg
                                          xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                          viewBox="0 0 18 18" fill="none">
                                          <path d="M15.7501 15.75L12.4951 12.495" stroke="#A4A5A7"
                                             stroke-width="1.5" stroke-linecap="round"
                                             stroke-linejoin="round" />
                                          <path
                                             d="M8.25 14.25C11.5637 14.25 14.25 11.5637 14.25 8.25C14.25 4.93629 11.5637 2.25 8.25 2.25C4.93629 2.25 2.25 4.93629 2.25 8.25C2.25 11.5637 4.93629 14.25 8.25 14.25Z"
                                             stroke="#A4A5A7" stroke-width="1.5" stroke-linecap="round"
                                             stroke-linejoin="round" />
                                       </svg>
                                    </template>
                                    </q-input>
                                 </div>
                              </div>
                              <q-separator class="separatorColor" />
                           </template>
                           <template v-slot:option="scope">
                              <q-item
                                 v-if="scope.opt.isPlaceholder">
                                 <q-item-section class="text-grey text-center">
                                    No results found
                                 </q-item-section>
                              </q-item>
                              <q-item dense v-else v-bind="scope.itemProps"
                                 class="q-py-none">
                                 <q-item-section>
                                    <q-item-label> {{ scope.opt.label }}
                                    </q-item-label>
                                 </q-item-section>
                              </q-item>
                           </template>
                        </q-select>
                     </div>
                     <hr />
                     <div class="filtersviewlist">
                        <q-list dense class="scroll">
                           <q-item v-for="(item, index) in filterview" :key="item.id || index" clickable
                              :active="item.selected" active-class="selected"
                              @click="selectFilterItem(index)">
                              <q-item-section class="filtertitle">
                                 {{ item.label }}
                                 <i v-if="item.icon"
                                    :class="item.icon + ' q-ml-sm defaulticon'"></i>
                              </q-item-section>
                              <q-item-section
                                 side><span class="viewscount">{{ item.count
                                 }}</span>
                              </q-item-section>
                              <q-item-section class="filterviewmenu" side
                                 @click.stop>
                                 <i class="fa-light fa-ellipsis-vertical"></i>
                                 <q-menu
                                    class="threedotmenu">
                                    <q-list dense style="min-width: 100px">
                                       <q-item
                                          clickable
                                          v-close-popup>
                                          <q-item-section>Edit</q-item-section>
                                       </q-item>
                                       <q-item
                                          clickable v-close-popup
                                          @click="setDefault(index)">
                                          <q-item-section>Set
                                             default
                                          </q-item-section>
                                       </q-item>
                                       <q-item clickable
                                          v-close-popup>
                                          <q-item-section>Set
                                             global
                                          </q-item-section>
                                       </q-item>
                                       <q-item clickable
                                          v-close-popup>
                                          <q-item-section>Hide</q-item-section>
                                       </q-item>
                                       <q-item
                                          clickable
                                          v-close-popup>
                                          <q-item-section>Delete</q-item-section>
                                       </q-item>
                                    </q-list>
                                 </q-menu>
                              </q-item-section>
                           </q-item>
                        </q-list>
                     </div>
                     <div class="createview q-mb-sm q-px-md q-py-sm text-secondary cursor-pointer fw-500">
                        <i
                              class="hgi hgi-stroke hgi-add-circle q-mr-sm"></i> Create view
                     </div>
                  </div>
                  <div class="col q-px-md rightside">
                     <div class="row items-center q-py-sm q-my-xs">
                        <div class="col-auto">
                           <h3 class="q-pr-md">Assets</h3>
                        </div>
                        <div class="col">
                           <q-btn-group unelevated>
                              <q-btn outline dense :ripple="false" :class="btnClass('list')"
                                 @click.stop="setActive('list')"><i class="hgi hgi-stroke hgi-left-to-right-list-bullet q-mr-xs"></i>List
                              </q-btn>
                              <q-btn outline dense :ripple="false" :class="btnClass('apps')"
                                 @click.stop="setActive('apps')"><i
                                 class="hgi hgi-stroke hgi-dashboard-square-03 q-mr-xs"></i>Apps </q-btn>
                              <q-btn outline :ripple="false"
                                 dense :class="btnClass('patches')" @click.stop="setActive('patches')"><i
                                 class="hgi hgi-stroke hgi-setting-07 q-mr-xs"></i>Patches
                              </q-btn>
                           </q-btn-group>
                        </div>
                        <div class="col-auto topfilters">
                           <q-btn :class="{'activebtn':enableFilters}" outline dense @click="toggleFilters"><i
                              class="hgi hgi-stroke hgi-filter q-mr-xs"></i> Filter</q-btn>
                           <q-btn outline dense class="q-ml-sm"><i
                              class="hgi hgi-stroke hgi-layout-2-column q-mr-xs"></i>Column <i
                              class="hgi hgi-stroke hgi-arrow-down-01 q-ml-xs text-secondary"></i>
                              <q-menu class="columnsorting" :offset="[0,5]" @hide="onColumnSortingMenuClose">
                                 <div class="row searchfieldrow">
                                    <div class="col-12 q-px-md">
                                       <q-input v-model="searchColumnSorting" placeholder="Set or change columns" dense borderless
                                       @click.stop @keydown.stop
                                       @mousedown.stop>
                                       </q-input>
                                    </div>
                                    <div class="col-12 ">
                                       <hr/>
                                      </div>
                                 </div>
                         
                                 <q-list dense style="min-width: 300px">
                                    <q-item
                                      v-if="filteredColumnSorting.length === 0"
                                    >
                                      <q-item-section class="text-grey text-center">
                                         No results found
                                      </q-item-section>
                                    </q-item>
                                    <q-item
                                      v-else
                                      v-for="(item, index) in filteredColumnSorting"
                                      :key="item.name"
                                      class="draggable-item"
                                      :class="{'disableitem':item.disabled}"
                                    >
                                      <q-item-section side class="dragicon"     draggable="true"  @dragstart="dragStart(item, $event)"
                                      @dragover.prevent
                                      @drop="drop(item, $event)">
                                        <i class="hgi hgi-stroke hgi-drag-drop-vertical text-secondary cursor-move"></i>
                                      </q-item-section>
                                  
                                      <q-item-section side class="appicon">
                                        <i :class="item.icon" class="text-light"></i>
                                      </q-item-section>
                                  
                                      <q-item-section class="colname">
                                        {{ item.name }}
                                      </q-item-section>
                                  
                                      <q-item-section side class="visibleicon">
                                        <i
                                          :class="['cursor-pointer', item.disabled ? 'hgi hgi-stroke hgi-view text-grey-6' : 'hgi hgi-stroke hgi-view-off-slash text-light']"
                                          @click.stop="toggleVisibility(item)"
                                        ></i>
                                      </q-item-section>
                                    </q-item>
                                  </q-list>
                               </q-menu>
                              </q-btn>
                        </div>
                        <div class="col-auto">
                           <q-separator vertical />
                        </div>
                        <div class="col-auto">
                           <q-btn outline dense><i class="hgi hgi-stroke hgi-download-01  q-mr-xs"></i>
                              Export
                           </q-btn>
                           <q-btn outline dense class="q-ml-sm"><i
                              class="hgi hgi-stroke hgi-add-circle q-mr-xs"></i> New assets <i
                              class="hgi hgi-stroke hgi-arrow-down-01 q-ml-xs text-secondary"></i></q-btn>
                        </div>
                     </div>
                     <div class="row full-height">
                        <div class="col relative-position">
                           <q-table :rows="rows" :columns="tableColumns" row-key="id" flat bordered  ref="qTableRef"
                              separator="horizontal" hide-bottom hide-sort-icon :pagination="pagination">
                              <template
                                 #header="props">
                                 <tr>
                                    <th v-for="col in props.cols" :key="col.name" class="text-left"
                                       :class="{ assetnamecol: col.name === 'assetname' }"
                                       :style="{ 'border-bottom-color': enableFilters ? 'var(--bg-table-row) !important' : '' }"
                                       @click="col.sortable && props.sort(col)">
                                       <div class="row items-center no-wrap">
                                          <span>{{ col.label }}</span><i v-if="col.sortable"
                                             :class="[ sortIcon(props, col), 'q-ml-xs sort-icon' ]" />
                                       </div>
                                    </th>
                                    
                                 </tr>
                                 <tr class="filterrow" v-if="enableFilters">
                                    <th v-for="col in props.cols" :key="col.name" class="text-left"
                                       :class="{ assetnamecol: col.name === 'assetname' }">
                                       <div v-if="col.name !== 'statusicon' && col.name !== 'actions'"
                                          class="row items-center no-wrap">
                                          <q-select
                                             v-if="col.name !== 'assetname' && col.name !== 'description' && col.name !== 'serial' && col.name !== 'primaryContact' && col.name !== 'createdOn'"
                                             dense outlined
                                             dropdown-icon="hgi hgi-stroke hgi-arrow-down-01 selectArrowIcon md--text"
                                             :options="options" :label="col.label"
                                             clear-icon="hgi hgi-stroke hgi-cancel-01 selectArrowIcon lg--text" clearable />
                                       </div>
                                       <div v-if="col.name !== 'statusicon' && col.name !== 'actions'"
                                          class="row items-center no-wrap">
                                          <q-input
                                             v-if="col.name == 'assetname' || col.name == 'description' || col.name == 'serial' || col.name == 'primaryContact' || col.name == 'createdOn'"
                                             dense outlined v-model="text" :placeholder="col.label"
                                             clear-icon="hgi hgi-stroke hgi-cancel-01 selectArrowIcon lg--text" clearable />
                                       </div>
                                    </th>
                                 </tr>
                              </template>
                              <template #body-cell-statusicon="props">
                                 <q-td :props="props"><i
                                    class="fa-solid fa-square statusicon"
                                    :class="[props.value === 'Active' ? 'bg-active' : 'bg-inactive']"></i></q-td>
                              </template>
                              <template
                                 #body-cell-assetname="props">
                                 <q-td :props="props"
                                 :class="{ 'is-scrolled': isHorizontallyScrolled }"
                                    class="row items-center assetnametd"><i :class="[platformIcon(props.row.platform), 'q-mr-sm']"
                                    ></i><span>{{
                                    props.value }}1231</span>
                                 </q-td>
                              </template>
                              <template
                                 #body-cell-status="props">
                                 <q-td :props="props">
                                    <q-chip
                                       :class="props.value === 'Active' ? 'activechip' : 'inactivechip'" dense>
                                       {{ props.value }}
                                    </q-chip>
                                 </q-td>
                              </template>
                              <template #body-cell-antivirus="props">
                                 <q-td :props="props">
                                    <q-chip v-if="props.value === 'Up To Date'"
                                       :class="props.value === 'Up To Date' ? 'activechip' : ''" dense>
                                       <i class="hgi hgi-stroke hgi-checkmark-circle-02 q-mr-xs"></i> {{ props.value }}
                                    </q-chip>
                                    <span v-else>
                                    {{ props.value }}
                                    </span>
                                 </q-td>
                              </template>
                              <template #body-cell-app="props">
                                 <q-td :props="props">
                                    <q-chip v-if="props.value === 'Up To Date'" class="activechip" dense>
                                       <i class="hgi hgi-stroke hgi-checkmark-circle-02 q-mr-xs"></i> {{ props.value }}
                                    </q-chip>
                                    <span v-else>
                                    {{ props.value }}
                                    </span>
                                 </q-td>
                              </template>
                              <template #body-cell-firewall="props">
                                 <q-td :props="props">
                                    <q-chip v-if="props.value === 'Enabled' || props.value === 'Disabled'"
                                       :class="{
                                       activechip: props.value === 'Enabled',
                                       inactivechip: props.value === 'Disabled'
                                       }" dense>
                                       {{ props.value }}
                                    </q-chip>
                                    <span v-else>
                                    {{ props.value }}
                                    </span>
                                 </q-td>
                              </template>
                              <template #body-cell-actions="props">
                                 <q-td :props="props" class="actionbtn">
                                    <q-btn class="q-mr-sm">
                                       <i class="fa-regular fa-arrow-rotate-right"></i>
                                    </q-btn>
                                    <q-btn class="error-btn">
                                       <i class="hgi hgi-stroke hgi-delete-03"></i>
                                    </q-btn>
                                 </q-td>
                              </template>
                           </q-table>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
        </div>
            </q-page-container>
         </q-layout>
   
      </div>
      <script src="assets/js/vue.global.prod.js"></script>
      <script src="assets/js/quasar.umd.prod.js"></script>
      <script src="assets/js/custom.js"></script>
   </body>
</html>
